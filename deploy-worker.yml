name: Deploy Worker
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # إذا كان ملف index.js في المجلد الرئيسي، اتركها هكذا
          # إذا كان في مجلد فرعي، قم بتغيير workingDirectory
          workingDirectory: '.'
          command: deploy