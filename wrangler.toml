name = "initialsafety" # تم تحديث اسم Worker ليتطابق مع اسم المستودع
main = "index.js"
compatibility_date = "2026-05-11" # تم تحديث التاريخ ليتوافق مع أحدث الميزات

[[d1_databases]]
binding = "DB"
database_name = "my-file-db"
database_id = "ضع_هنا_المعرف_الذي_نسخته_من_كلاود_فلاير" 

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "my-company-files-bucket" # **هام:** استبدل هذا باسم دلو R2 الخاص بك (لا تنس هذه الخطوة!)